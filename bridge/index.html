<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CallMirror Live</title>
  <style>
    @font-face {
      font-family: "Konstanz Regular";
      src: local("Konstanz Regular"), local("Konstanz");
      font-style: normal;
      font-weight: 400;
    }

    :root {
      color-scheme: light;
      --bg: #f7f4ee;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-strong: rgba(255, 255, 255, 0.9);
      --ink: #1b1b1b;
      --muted: #666f7d;
      --line: rgba(228, 216, 201, 0.9);
      --brand: #ff6b1f;
      --brand-hover: #e85f1a;
      --ok: #19a44b;
      --warn: #f59e0b;
      --danger: #d94828;
      --shadow-soft: 0 16px 34px rgba(20, 18, 14, 0.08);
      --shadow-deep: 0 26px 70px rgba(20, 18, 14, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Konstanz Regular", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 7% 10%, #ffe9d9 0%, transparent 32%),
        radial-gradient(circle at 92% 12%, #f5eadf 0%, transparent 28%),
        var(--bg);
      padding: 18px;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.035) 0, rgba(0, 0, 0, 0.035) 1px, transparent 1px, transparent 3px),
        repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.02) 0, rgba(0, 0, 0, 0.02) 1px, transparent 1px, transparent 4px);
    }

    .shell {
      width: min(1280px, 100%);
      height: calc(100vh - 36px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(290px, 372px) minmax(340px, 1fr);
      gap: 18px;
      overflow: hidden;
      animation: fade-up 380ms ease;
    }

    .panel,
    .stage {
      min-height: 0;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--shadow-deep);
      position: relative;
      overflow: hidden;
    }

    .panel::after,
    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .panel {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.56rem;
      letter-spacing: -0.24px;
      font-weight: 400;
      line-height: 1.08;
    }

    .status {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(228, 216, 201, 0.95);
      background: var(--surface-strong);
      box-shadow: var(--shadow-soft);
    }

    .status-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid rgba(223, 212, 197, 0.95);
      background: #fff;
      padding: 6px 12px;
      font-size: 0.82rem;
      color: #4f5660;
      font-weight: 400;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #abb2be;
      transition: background 160ms ease, box-shadow 160ms ease;
    }

    .live-pill.on {
      border-color: #bae7c8;
      background: #f3fbf6;
      color: #117939;
    }

    .live-pill.on .dot {
      background: var(--ok);
      box-shadow: 0 0 0 5px rgba(25, 164, 75, 0.15);
    }

    .stream-meta {
      color: var(--muted);
      font-size: 0.8rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid rgba(226, 214, 198, 0.95);
      border-radius: 12px;
      padding: 7px 8px;
      background: rgba(255, 255, 255, 0.76);
      display: grid;
      gap: 3px;
      min-height: 52px;
    }

    .metric-label {
      font-size: 0.68rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #8a919d;
      line-height: 1;
    }

    .metric-value {
      font-size: 0.88rem;
      color: #29303a;
      line-height: 1.1;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .metric-value.health-good {
      color: #0f7a39;
    }

    .metric-value.health-warn {
      color: #9a6700;
    }

    .metric-value.health-idle {
      color: #6b7280;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    button {
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 11px 13px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 400;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease, opacity 120ms ease, background 120ms ease;
    }

    button:hover {
      filter: brightness(0.98);
    }

    button:active {
      transform: translateY(1px) scale(0.995);
    }

    #start-btn {
      background: var(--brand);
      color: #fff;
    }

    #start-btn:hover {
      background: var(--brand-hover);
    }

    #stop-btn {
      min-width: 96px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--danger);
      border-color: #f5c8b8;
    }

    #stop-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .log {
      flex: 1;
      min-height: 0;
      border-radius: 14px;
      border: 1px solid #20242a;
      background: #101318;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .log h2 {
      margin: 0;
      padding: 10px 12px;
      color: #d2dae6;
      font-size: 0.74rem;
      letter-spacing: 0.75px;
      text-transform: uppercase;
      font-weight: 400;
      border-bottom: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(255, 255, 255, 0.01);
    }

    #logs {
      margin: 0;
      padding: 8px 12px 12px;
      list-style: none;
      overflow: auto;
      min-height: 0;
      display: grid;
      gap: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.74rem;
      line-height: 1.35;
      color: #e5edf8;
    }

    #logs li {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
    }

    #logs .time {
      color: #8fb5f8;
      white-space: nowrap;
    }

    .stage {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 16px;
      animation: fade-up 420ms ease;
    }

    .phone {
      width: min(400px, calc((100vh - 106px) * 0.4615), calc(100% - 10px));
      aspect-ratio: 9 / 19.5;
      border-radius: 46px;
      padding: 12px;
      background: linear-gradient(150deg, #1c1c1d 0%, #080808 100%);
      box-shadow: 0 34px 88px rgba(0, 0, 0, 0.45);
      position: relative;
      flex-shrink: 0;
      overflow: hidden;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 34%;
      height: 22px;
      border-radius: 999px;
      background: #010101;
      z-index: 4;
    }

    .phone::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background: linear-gradient(170deg, rgba(255, 255, 255, 0.2) 0%, transparent 36%);
      opacity: 0.28;
    }

    .screen {
      width: 100%;
      height: 100%;
      border-radius: 34px;
      overflow: hidden;
      position: relative;
      background: #fff;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    #video {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 58%;
      transform: translate(-50%, -50%) scale(1.18);
      transform-origin: center;
      background: #fff;
      opacity: 0;
      transition: opacity 220ms ease;
    }

    .screen.live #video {
      opacity: 1;
    }

    .placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 10px;
      padding: 20px;
      text-align: center;
      color: #66707e;
      font-size: 0.88rem;
      line-height: 1.35;
      background:
        linear-gradient(180deg, rgba(255, 251, 245, 0.88), rgba(255, 255, 255, 0.95)),
        repeating-linear-gradient(
          -45deg,
          rgba(203, 213, 225, 0.17),
          rgba(203, 213, 225, 0.17) 12px,
          rgba(255, 255, 255, 0.2) 12px,
          rgba(255, 255, 255, 0.2) 24px
        );
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .placeholder-mark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(229, 217, 201, 0.95);
      background: rgba(255, 255, 255, 0.86);
      display: grid;
      place-items: center;
      color: #9aa3b2;
      font-size: 1rem;
    }

    .screen.live .placeholder {
      opacity: 0;
      transform: scale(1.012);
      pointer-events: none;
    }

    .toast-stack {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: grid;
      gap: 8px;
      z-index: 40;
      pointer-events: none;
    }

    .toast {
      min-width: 220px;
      max-width: 320px;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.82rem;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: var(--shadow-soft);
      color: #1f2937;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      border-color: rgba(25, 164, 75, 0.35);
      color: #0f6f33;
    }

    .toast.warn {
      border-color: rgba(245, 158, 11, 0.4);
      color: #8a5a00;
    }

    .toast.error {
      border-color: rgba(217, 72, 40, 0.35);
      color: #9f2b13;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 980px) {
      body {
        padding: 12px;
      }

      .shell {
        height: calc(100vh - 24px);
        grid-template-columns: minmax(230px, 310px) 1fr;
        gap: 12px;
      }

      .panel {
        padding: 14px;
      }

      .phone {
        width: min(360px, calc((100vh - 76px) * 0.4615), calc(100% - 8px));
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .toast-stack {
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <h1>CallMirror</h1>

      <section class="status">
        <div class="status-top">
          <div class="live-pill" id="live-pill">
            <span class="dot"></span>
            <span id="live-text">Idle</span>
          </div>
          <span class="stream-meta" id="stream-meta">No source selected</span>
        </div>

        <div class="metrics">
          <div class="metric">
            <span class="metric-label">Resolution</span>
            <span class="metric-value" id="metric-res">-</span>
          </div>
          <div class="metric">
            <span class="metric-label">FPS</span>
            <span class="metric-value" id="metric-fps">-</span>
          </div>
          <div class="metric">
            <span class="metric-label">Health</span>
            <span class="metric-value health-idle" id="metric-health">idle</span>
          </div>
        </div>
      </section>

      <div class="actions">
        <button id="start-btn">Start / Reselect</button>
        <button id="stop-btn" disabled>Stop</button>
      </div>

      <section class="log">
        <h2>Runtime Log</h2>
        <ul id="logs"></ul>
      </section>
    </section>

    <section class="stage">
      <div class="phone" aria-label="Phone preview window">
        <div class="screen" id="screen">
          <video id="video" autoplay playsinline muted></video>
          <div class="placeholder" id="placeholder">
            <div class="placeholder-mark">+</div>
            <div>Select a source to start preview</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast-stack" id="toast-stack"></div>

  <script>
    const video = document.getElementById('video');
    const screen = document.getElementById('screen');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const livePill = document.getElementById('live-pill');
    const liveText = document.getElementById('live-text');
    const streamMeta = document.getElementById('stream-meta');
    const logsEl = document.getElementById('logs');
    const toastStack = document.getElementById('toast-stack');

    const metricRes = document.getElementById('metric-res');
    const metricFps = document.getElementById('metric-fps');
    const metricHealth = document.getElementById('metric-health');

    const FIXED_FRAMING = {
      zoom: 1.18,
      x: 50,
      y: 58
    };

    let activeStream = null;

    function log(message) {
      const item = document.createElement('li');
      const time = new Date().toLocaleTimeString([], { hour12: false });
      item.innerHTML = `<span class="time">${time}</span><span>${message}</span>`;
      logsEl.prepend(item);

      if (logsEl.children.length > 120) {
        logsEl.removeChild(logsEl.lastElementChild);
      }
    }

    function showToast(message, type = 'default') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toastStack.prepend(toast);

      requestAnimationFrame(() => {
        toast.classList.add('show');
      });

      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 220);
      }, 2600);
    }

    function setMetrics({ width = '-', height = '-', fps = '-', health = 'idle' } = {}) {
      metricRes.textContent = width === '-' || height === '-' ? '-' : `${width}x${height}`;
      metricFps.textContent = fps === '-' ? '-' : `${fps}`;
      metricHealth.textContent = health;

      metricHealth.classList.remove('health-good', 'health-warn', 'health-idle');
      if (health === 'good') {
        metricHealth.classList.add('health-good');
      } else if (health === 'warn') {
        metricHealth.classList.add('health-warn');
      } else {
        metricHealth.classList.add('health-idle');
      }
    }

    function applyFixedFraming() {
      video.style.transform = `translate(-50%, -50%) scale(${FIXED_FRAMING.zoom})`;
      video.style.objectPosition = `${FIXED_FRAMING.x}% ${FIXED_FRAMING.y}%`;
    }

    function setLiveState(isLive) {
      livePill.classList.toggle('on', isLive);
      liveText.textContent = isLive ? 'Live' : 'Idle';
      screen.classList.toggle('live', isLive);
      stopBtn.disabled = !isLive;
    }

    function stopCurrentStream({ silent = false } = {}) {
      if (!activeStream) return;

      activeStream.getTracks().forEach((track) => track.stop());
      activeStream = null;

      video.srcObject = null;
      setLiveState(false);
      streamMeta.textContent = 'No source selected';
      setMetrics({ health: 'idle' });

      if (!silent) {
        log('Stream stopped');
        showToast('Stream stopped', 'warn');
      }
    }

    async function startLiveOutput() {
      try {
        stopCurrentStream({ silent: true });

        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: {
            frameRate: { ideal: 30, max: 60 },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });

        activeStream = stream;
        video.srcObject = stream;
        applyFixedFraming();
        setLiveState(true);

        const [track] = stream.getVideoTracks();
        const settings = track ? track.getSettings() : {};
        const width = settings.width || '?';
        const height = settings.height || '?';
        const fps = settings.frameRate ? Math.round(settings.frameRate) : '?';

        streamMeta.textContent = `${width}x${height} @ ${fps}fps`;

        const health = fps !== '?' && fps < 20 ? 'warn' : 'good';
        setMetrics({ width, height, fps, health });

        log(`Source active (${width}x${height} @ ${fps}fps)`);
        showToast('Source connected', 'success');

        if (track) {
          track.addEventListener('ended', () => {
            stopCurrentStream({ silent: true });
            log('Capture ended by browser or user');
            showToast('Capture ended', 'warn');
          });
        }
      } catch (error) {
        setLiveState(false);
        streamMeta.textContent = 'No source selected';
        setMetrics({ health: 'idle' });
        log(`Start failed: ${error.message}`);
        showToast('Permission or source selection failed', 'error');
      }
    }

    startBtn.addEventListener('click', startLiveOutput);
    stopBtn.addEventListener('click', () => stopCurrentStream());

    applyFixedFraming();
    setMetrics({ health: 'idle' });
    log('UI ready.');
  </script>
</body>
</html>
